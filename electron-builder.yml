appId: com.ibooth.app
productName: iBooth
directories:
  buildResources: build
  output: release

mac:
  category: public.app-category.photography
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  extendInfo:
    - NSCameraUsageDescription: iBooth requires camera access to take photos.
  hardenedRuntime: true
  artifactName: '${productName}-${version}-${os}-${arch}.${ext}'

win:
  target:
    - nsis
  artifactName: '${productName}-${version}-${os}-${arch}.${ext}'

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

publish:
  provider: github
